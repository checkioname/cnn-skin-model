defaults:
  - model: vgg16
  - _self_

training:
  epochs: 50
  batch_size: 32
  num_workers: 4
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0
  optimizer: sgd
  scheduler: plateau
  patience: 7
  min_delta: 0.001
  unfreeze_blocks: 0
  pos_weight: 0

data:
  csv: dataset.csv
  folds: 4
  fold: 1
  preprocessed_dir: ""

results_dir: ../cnn-skin-model-runs

seed: 42
dp: false
