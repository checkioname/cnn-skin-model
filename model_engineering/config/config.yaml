defaults:
  - _self_
  - model: vgg16

training:
  epochs: 50
  batch_size: 32
  num_workers: 4
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0
  optimizer: sgd
  scheduler: plateau  # plateau, step, cosine
  patience: 7
  min_delta: 0.001

data:
  csv: dataset.csv
  folds: 4
  fold: 1
  preprocessed_dir: ""  # se preenchido, usa imagens pré-processadas (pula OpenCV online)

runs_repo:
  path: ""          # caminho para o repositório psoriasis-runs (vazio = local runs/)
  remote: "git@github.com:checkioname/psoriasis-runs.git"
  auto_push: false  # faz git push automático ao final do treino

seed: 42
dp: false
