defaults:
  - model: vgg16
  - _self_

training:
  epochs: 50
  batch_size: 32
  num_workers: 4
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001
  optimizer: sgd  # sgd, adam
  scheduler: plateau  # plateau, step, cosine
  patience: 7
  min_delta: 0.001
  unfreeze_blocks: 0  # 0=frozen, 1=ultimo bloco, -1=todos
  pos_weight: 0  # 0=desativado, >0 pondera classe positiva (ex: 1.955 = psoríase/dermatite)

data:
  csv: dataset.csv
  folds: 4
  fold: 1
  preprocessed_dir: ""  # se preenchido, usa imagens pré-processadas (pula OpenCV online)

results_dir: ../cnn-skin-model-runs  # tudo versionado via Git LFS: mlflow/, tensorboard/, hydra/, metrics/

hydra:
  run:
    dir: ${results_dir}/hydra/${model}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${results_dir}/hydra/multirun/${model}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job_logging:
    root:
      handlers: [console, file]

seed: 42
dp: false
